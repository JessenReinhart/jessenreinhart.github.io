# Capture project screenshots via Playwright (runs on GitHub Actions runner)
#
# Trigger:
#   Push — include [shot-all] or [shot:<key>] in commit message
#          e.g. "add new travel app [shot:tripcore]"
#   Dispatch — manual from Actions tab, fill in URL + filename

name: Capture Screenshot

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      url:
        description: "Live site URL to capture"
        required: true
      file:
        description: "Output filename (e.g. myproj-live.webp)"
        required: true

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        # Skip browser download — pakai Chrome yg udah ada di runner
        run: |
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install playwright

      - name: Parse shot target from commit messages
        id: parse
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              COMMITS=$(git log --format=%s -1 HEAD 2>/dev/null || true)
            else
              COMMITS=$(git log "$BEFORE"..HEAD --format=%s 2>/dev/null || true)
            fi

            # [shot-all] → capture all projects
            if echo "$COMMITS" | grep -q '\[shot-all\]' 2>/dev/null; then
              echo "all=true" >> "$GITHUB_OUTPUT"
            else
              # [shot:<key>] → capture one project
              SHOT_KEY=$(echo "$COMMITS" | sed -n 's/.*\[shot:\([a-z0-9_-]*\)\].*/\1/p' | head -1)
              if [ -n "$SHOT_KEY" ]; then
                echo "key=$SHOT_KEY" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            echo "url=${{ inputs.url }}" >> "$GITHUB_OUTPUT"
            echo "file=${{ inputs.file }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run screenshot capture
        if: steps.parse.outputs.key != '' || steps.parse.outputs.url != '' || steps.parse.outputs.all != ''
        run: |
          KEY="${{ steps.parse.outputs.key }}"
          URL="${{ steps.parse.outputs.url }}"
          FILE="${{ steps.parse.outputs.file }}"
          ALL="${{ steps.parse.outputs.all }}"
          if [ -n "$ALL" ]; then
            node scripts/capture-screenshots.mjs
          elif [ -n "$KEY" ]; then
            node scripts/capture-screenshots.mjs --key="$KEY"
          else
            node scripts/capture-screenshots.mjs --url="$URL" --file="$FILE"
          fi

      - name: Commit screenshot back to repo
        if: steps.parse.outputs.key != '' || steps.parse.outputs.url != '' || steps.parse.outputs.all != ''
        shell: bash
        run: |
          git config user.name "screenshot-bot"
          git config user.email "bot@jessenreinhart.dev"
          git add public/screenshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "capture: refresh project screenshots"
            git push
          fi
